<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>所見情形產生器</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0D1B2A;--bg-panel:#142231;--bg-card:#1A2D40;--bg-input:#0F1E2D;
  --border:#2A4055;--border-bright:#3D6080;
  --steel:#8BA3B8;--steel-light:#A8C0D4;
  --orange:#E8933A;--orange-dim:#C4762D;
  --green:#4CAF7A;--red:#E85A4F;--yellow:#F0C040;--white:#F0F4F8;--dim:#5A7A95;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-deep);color:var(--white);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

header{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;}
.hbadge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--bg-deep);background:var(--orange);padding:4px 8px;border-radius:2px;}
header h1{font-size:15px;font-weight:500;color:var(--steel-light);letter-spacing:.06em;}
#clock{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--orange);}

.workspace{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 53px);}

/* 左側 */
.editor{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.form-area{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

.modebar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.mode-lbl{font-size:11px;color:var(--dim);letter-spacing:.04em;}
.stat{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--orange);}

.pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:none;color:var(--steel);transition:all .15s;white-space:nowrap;}
.pill:hover{border-color:var(--border-bright);}
.pill.sel-info{border-color:#4A90C4;color:#4A90C4;background:rgba(74,144,196,.12);}
.pill.sel-warn{border-color:var(--yellow);color:var(--yellow);background:rgba(240,192,64,.1);}

.field-label{font-size:11px;font-weight:500;color:var(--steel);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:vertical;transition:border-color .15s;line-height:1.7;}
textarea:focus{border-color:var(--border-bright);}
textarea::placeholder{color:var(--dim);font-size:12px;}

/* 解析預覽 */
.prev-label{font-size:10px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.prev-label span{color:var(--orange);font-family:'JetBrains Mono',monospace;font-size:11px;}
.cat-block{background:var(--bg-input);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;overflow:hidden;}
.cat-head{background:var(--bg-card);padding:6px 12px;font-size:12px;color:var(--orange);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.cat-head .cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
.cat-items{padding:6px 12px;display:flex;flex-direction:column;gap:3px;}
.cat-item{font-size:12px;color:var(--steel-light);padding:3px 0;border-bottom:1px solid var(--border);}
.cat-item:last-child{border-bottom:none;}

/* 頁尾 */
.foot{background:var(--bg-panel);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:8px;}
.btn-gen{background:var(--orange);color:var(--bg-deep);border:none;border-radius:4px;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;padding:9px 22px;cursor:pointer;transition:background .15s;}
.btn-gen:hover{background:var(--orange-dim);}
.btn-clr{background:none;border:1px solid var(--border);border-radius:4px;color:var(--steel);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:9px 14px;cursor:pointer;transition:all .15s;}
.btn-clr:hover{border-color:var(--border-bright);color:var(--white);}

/* 右側預覽 */
.preview{display:flex;flex-direction:column;overflow:hidden;}
.prev-head{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;}
.prev-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--steel);letter-spacing:.12em;}
.prev-title span{color:var(--green);}
.btn-copy{margin-left:auto;background:none;border:1px solid var(--border-bright);border-radius:4px;color:var(--steel-light);font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 12px;cursor:pointer;transition:all .15s;}
.btn-copy:hover,.btn-copy.copied{border-color:var(--green);color:var(--green);}
.prev-body{flex:1;overflow-y:auto;padding:20px;}
.prev-out{font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.9;color:var(--white);white-space:pre-wrap;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:20px 24px;min-height:160px;}
.prev-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--dim);}
.prev-empty .icon{font-size:32px;opacity:.4;}
.prev-empty p{font-size:13px;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:768px){.workspace{grid-template-columns:1fr;}.preview{height:50vh;}}
</style>
</head>
<body>

<header>
  <div class="hbadge">OBS</div>
  <h1>所見情形產生器</h1>
  <div id="clock"></div>
</header>

<div class="workspace">

  <!-- 左側 -->
  <div class="editor">
    <div class="form-area">

      <div class="modebar">
        <span class="mode-lbl">輸出模式：</span>
        <div class="pills" id="mode">
          <button class="pill sel-info" data-v="normal" data-col="info">正常版</button>
          <button class="pill" data-v="brief" data-col="warn">精簡版</button>
        </div>
        <span class="stat" id="stat">－</span>
      </div>

      <div class="field-label">貼入所見情形內容</div>
      <textarea id="obs" placeholder="直接貼上各員工提供內容，格式不限，系統自動辨識類別與項目。

支援混貼，例如：

（一）OO類：
1、項目內容
2、項目內容

一、OO類：
（一）項目內容
（二）項目內容

(一)OO類
1.
2." style="min-height:calc(100vh - 280px);" oninput="preview()"></textarea>

      <div id="prev-box" style="display:none;">
        <div class="prev-label">解析預覽 <span id="prev-stat"></span></div>
        <div id="prev-content"></div>
      </div>

    </div>
    <div class="foot">
      <button class="btn-gen" onclick="generate()">產生所見情形</button>
      <button class="btn-clr" onclick="clearAll()">清除</button>
    </div>
  </div>

  <!-- 右側 -->
  <div class="preview">
    <div class="prev-head">
      <div class="prev-title">OUTPUT <span>▮</span></div>
      <button class="btn-copy" id="copyBtn" onclick="copyOut()">複製全文</button>
    </div>
    <div class="prev-body">
      <div id="prevEmpty" class="prev-empty">
        <div class="icon">📋</div>
        <p>貼入內容後點擊「產生所見情形」</p>
      </div>
      <div id="prevOut" class="prev-out" style="display:none;"></div>
    </div>
  </div>

</div>

<script>
'use strict';

// ── Clock ──
function tick(){
  const n=new Date(),p=x=>String(x).padStart(2,'0');
  document.getElementById('clock').textContent=
    `${n.getFullYear()}/${p(n.getMonth()+1)}/${p(n.getDate())}  ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}
tick(); setInterval(tick,1000);

// ── Pills ──
document.addEventListener('click',e=>{
  const pill=e.target.closest('.pill'); if(!pill) return;
  const grp=pill.closest('.pills'); if(!grp) return;
  grp.querySelectorAll('.pill').forEach(p=>p.className='pill');
  pill.classList.add('sel-'+(pill.dataset.col||'info'));
  setTimeout(preview,30);
});
function getPill(id){
  const g=document.getElementById(id); if(!g) return '';
  const s=g.querySelector('.pill[class*="sel-"]'); return s?s.dataset.v:'';
}

// ── 降階層級定義 ──
// 層級 0：壹貳參（章節，不在此處理）
// 層級 1：一、二、三、
// 層級 2：（一）（二）（三）
// 層級 3：1、2、3、
// 層級 4：(1)(2)(3) 或 （1）（2）（3）含數字
// 層級 5：a b c（純英文字母開頭）
// 層級 6：(a)(b)(c)

function detectLevel(t){
  if(!t) return -1;
  if(/^[壹貳參肆伍陸柒捌玖拾]、/.test(t)) return 0;       // 章節
  if(/^[一二三四五六七八九十百]+[、.．]\s*/.test(t)) return 1;    // 一、 或 一.
  if(/^[\（\(][一二三四五六七八九十]+[\）\)]/.test(t)) return 2; // （一）
  if(/^\d+[、.．]\s*/.test(t)) return 3;                     // 1、 或 1.
  if(/^[\（\(]\d+[\）\)]/.test(t)) return 4;               // (1)
  if(/^[a-zA-Z][.、\s]/.test(t)&&t.length>1) return 5;     // a.
  if(/^[\（\(][a-zA-Z][\）\)]/.test(t)) return 6;          // (a)
  return -1; // 非編號行（延伸說明）
}

function stripPrefix(t){
  return t
    .replace(/^[壹貳參肆伍陸柒捌玖拾]、/,'')
    .replace(/^[一二三四五六七八九十百]+[、.．]\s*/,'')
    .replace(/^[\（\(][一二三四五六七八九十]+[\）\)]\s*/,'')
    .replace(/^\d+[、.．]\s*/,'')
    .replace(/^[\（\(]\d+[\）\)]\s*/,'')
    .replace(/^[a-zA-Z][.、]\s*/,'')
    .replace(/^[\（\(][a-zA-Z][\）\)]\s*/,'')
    .trim();
}

// 輸出時重新編號
const ZH_BIG  =['壹','貳','參','肆','伍','陸','柒','捌','玖','拾'];
const ZH_MID  =['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
const ALPHA   =['a','b','c','d','e','f','g','h','i','j','k','l','m','n','o','p','q','r','s','t','u','v','w','x','y','z'];

function formatPrefix(level, idx){
  switch(level){
    case 0: return ZH_BIG[idx]+'、';
    case 1: return ZH_MID[idx]+'、';
    case 2: return '（'+ZH_MID[idx]+'）';
    case 3: return (idx+1)+'、';
    case 4: return '（'+(idx+1)+'）';
    case 5: return ALPHA[idx]+'.';
    case 6: return '('+ALPHA[idx]+')';
    default: return '';
  }
}

// ── Parse ──
function isSummary(t){
  // 統計摘要行：去掉「計N項N件」後幾乎沒有剩餘文字（純統計句，無類別名稱）
  if(!/計\d+[項類件]/.test(t)) return false;
  const remain=t.replace(/計\d+[項類件]\d*[項類件]?/g,'').trim();
  // 剩餘文字過短（<2字）才視為純摘要；若有類別名稱（如「膳勤管理」）則保留
  return remain.replace(/[^\u4e00-\u9fff\w]/g,'').length<2;
}

function isCatTitle(t){
  // 類別標題：以冒號結尾、夠短，且本身不含編號前綴（一、二、1、（一）等）
  // 若已有編號前綴，代表這是「項目本身」而非新類別（即使以冒號結尾，如「三、…如下：」）
  if(detectLevel(t)>=0) return false;
  return /[：:]\s*$/.test(t) && t.replace(/計\d+[項類件]\d*[項類件]?/g,'').replace(/[^\u4e00-\u9fff\w]/g,'').length < 20;
}

// 無冒號的純文字標題：本身不含編號前綴，且：
// (a) 短句無標點（如「職安」），或
// (b) 含「計N項N件」統計但去除統計後仍有實質短名稱（如「膳勤管理計8項8件」）
function isBareTitle(t){
  if(!t) return false;
  if(detectLevel(t)>=0) return false;
  // 含統計字樣的標題：去掉統計部分後檢查剩餘是否為短名稱
  if(/計\d+[項類件]/.test(t)){
    const remain=t.replace(/計\d+[項類件]\d*[項類件]?/g,'').trim();
    return remain.length>0 && remain.length<12 && !/[，。；！？]/.test(remain);
  }
  if(/[，。、；：!?]/.test(t)) return false; // 含標點，視為一般說明句
  return t.length>0 && t.length<10;
}

function extractCatName(t){
  return t.replace(/[：:]\s*$/,'')
          .replace(/^[\（\(]?[一二三四五六七八九十\d]+[\）\)、．.]\s*/,'')
          .replace(/計\d+[項類件]\d*[項類件]?/g,'')
          .trim();
}

// parse 回傳 [{name, lines:[{level,text}]}]
function parse(raw){
  if(!raw.trim()) return [];
  const secPat=/^[壹貳參肆伍陸]、|^肆、|^已循/;
  const allLines=raw.split('\n')
    .filter(l=>!secPat.test(l.trim()))
    .filter(l=>!isSummary(l.trim()));

  // 偵測是否有類別+子層結構
  // 條件A：有冒號結尾的類別標題
  // 條件B：有「無冒號短標題行」且下一個有效行是編號項目（職安 → 1.NDI...）
  let hasCats=false;
  for(let i=0;i<allLines.length;i++){
    const t=allLines[i].trim();
    if(!t) continue;
    if(isCatTitle(t)){hasCats=true;break;}
    if(isBareTitle(t)){
      // 往後找下一個非空行，確認是否為編號項目
      for(let j=i+1;j<allLines.length;j++){
        const nt=allLines[j].trim();
        if(!nt) continue;
        if(detectLevel(nt)>=0){hasCats=true;}
        break;
      }
      if(hasCats) break;
    }
  }

  const cats=[];let cur=null;
  let refMode=false; // 是否處於「如下」引用子項模式

  function pushLine(t){
    const lv=detectLevel(t);
    const isPeriodNum=/^\d+[.．]\s*/.test(t)&&!/^\d+、/.test(t);
    if(lv>=0){
      // refMode 中且此行是句點型編號 → 持續視為延伸子項
      if(refMode&&isPeriodNum&&cur&&cur.lines.length>0){
        cur.lines.push({level:-1,text:t});
      } else {
        // 非句點型編號（中文數字、頓號等）→ 結束 refMode，視為正式項目
        cur.lines.push({level:lv,text:stripPrefix(t)});
        refMode=false;
      }
    } else if(cur&&cur.lines.length>0){
      cur.lines.push({level:-1,text:t});
    }
    // 若此行以「如下」結尾 → 進入 refMode，後續句點編號都當延伸子項
    if(/如下[：:]?\s*$/.test(t)) refMode=true;
  }

  if(hasCats){
    for(let i=0;i<allLines.length;i++){
      const t=allLines[i].trim(); if(!t) continue;
      if(isCatTitle(t)){
        cur={name:extractCatName(t),lines:[]};cats.push(cur);
        refMode=false;
      } else if(isBareTitle(t)){
        // 確認下一個有效行是編號項目，才視為標題；否則當一般內容
        let isRealTitle=false;
        for(let j=i+1;j<allLines.length;j++){
          const nt=allLines[j].trim(); if(!nt) continue;
          isRealTitle=detectLevel(nt)>=0; break;
        }
        if(isRealTitle){
          cur={name:extractCatName(t),lines:[]};cats.push(cur);
          refMode=false;
        } else if(cur){
          pushLine(t);
        }
      } else if(cur){
        pushLine(t);
      }
    }
  } else {
    cur={name:'',lines:[]};cats.push(cur);
    for(const line of allLines){
      const t=line.trim(); if(!t) continue;
      pushLine(t);
    }
  }
  return cats.filter(c=>c.lines.length>0);
}

// 把 lines 陣列重新編號輸出
// baseLevel：此組 lines 最淺層對應的輸出層級
// 例如類別下的一、二、三（minLv=1）→ baseLevel=3 → 輸出為 1、2、3、
function renderLines(lines, baseLevel){
  if(!lines.length) return '';
  const validLevels=lines.filter(l=>l.level>=0).map(l=>l.level);
  const minLv=validLevels.length?Math.min(...validLevels):baseLevel;
  const shift=baseLevel-minLv; // 層級偏移量

  const counters={};
  let out='';
  let lastRealLv=minLv;
  let subIdx=0; // 延伸行計數（level<0）

  for(const {level,text} of lines){
    if(level<0){
      // 延伸說明行：去掉原有的 1. 2. 等前綴再輸出
      const cleanText=text.replace(/^\d+[.．]\s*/,'').trim();
      const subLv=Math.min(lastRealLv+shift+1, 6);
      out+=formatPrefix(subLv,subIdx)+cleanText+'\n';
      subIdx++;
      continue;
    }
    subIdx=0;
    const outLv=level+shift;
    if(counters[outLv]===undefined) counters[outLv]=0;
    Object.keys(counters).forEach(k=>{if(Number(k)>outLv) delete counters[k];});
    out+=formatPrefix(outLv,counters[outLv])+text+'\n';
    counters[outLv]++;
    lastRealLv=level;
  }
  return out;
}

// 計算某 cat 的項目數（level 最淺的有效層級的行數）
function countItems(cat){
  if(!cat.lines.length) return 0;
  const levels=cat.lines.filter(l=>l.level>=0).map(l=>l.level);
  if(!levels.length) return 0;
  const minLv=Math.min(...levels);
  return cat.lines.filter(l=>l.level===minLv).length;
}

// ── Preview ──
function preview(){
  const raw=document.getElementById('obs').value;
  const cats=parse(raw);
  const box=document.getElementById('prev-box');
  if(!raw.trim()||!cats.length||!cats.some(c=>c.lines.length)){
    box.style.display='none';
    document.getElementById('stat').textContent='－';
    return;
  }
  const tc=cats.filter(c=>c.name).length||0;
  const ti=cats.reduce((s,c)=>s+countItems(c),0);
  const statTxt=tc>0?`${tc}類 ${ti}項`:`${ti}項`;
  document.getElementById('prev-stat').textContent=statTxt;
  document.getElementById('stat').textContent=statTxt;

  document.getElementById('prev-content').innerHTML=cats.map((cat,i)=>{
    const itemCount=countItems(cat);
    const previewLines=cat.lines.slice(0,8).map(({level,text})=>{
      if(level<0) return `<div class="cat-item" style="padding-left:20px;color:var(--dim);font-size:11px;">${text}</div>`;
      const indent=(level-Math.min(...cat.lines.filter(l=>l.level>=0).map(l=>l.level)))*14;
      return `<div class="cat-item" style="padding-left:${indent}px;">${text}</div>`;
    }).join('');
    const more=cat.lines.length>8?`<div class="cat-item" style="color:var(--dim);font-size:11px;">… 共${cat.lines.length}行</div>`:'';
    return `
    <div class="cat-block">
      <div class="cat-head">
        <span>${cat.name?`（${ZH_MID[i]||i+1}）${cat.name}`:cat.name===''?'（未分類）':cat.name}</span>
        <span class="cnt">${itemCount}項</span>
      </div>
      <div class="cat-items">${previewLines}${more}</div>
    </div>`;
  }).join('');
  box.style.display='block';
}

// ── Generate ──
function generate(){
  const raw=document.getElementById('obs').value.trim();
  const mode=getPill('mode');
  const cats=parse(raw);

  let out='參、所見情形：\n';

  if(!cats.length||!cats.some(c=>c.lines.length)){
    out+='所見情形彙整中。';
  } else {
    const validCats=cats.filter(c=>c.name!==undefined);
    const hasCatNames=validCats.some(c=>c.name);
    const tc=validCats.filter(c=>c.name).length;
    const ti=validCats.reduce((s,c)=>s+countItems(c),0);

    if(mode==='brief'){
      if(hasCatNames){
        out+=`一、本次督導所見情形共計${tc}類${ti}項，摘述如後：\n`;
        validCats.forEach((c,i)=>{
          if(c.name) out+=`（${ZH_MID[i]||i+1}）${c.name}計${countItems(c)}項。\n`;
          else out+=renderLines(c.lines,1);
        });
      } else {
        out+=`一、本次督導所見情形共計${ti}項，摘述如後：\n`;
        validCats.forEach(c=>{ out+=renderLines(c.lines,1); });
      }
      out=out.trimEnd();
    } else {
      // 正常版
      if(hasCatNames){
        out+=`一、本次督導所見情形計${tc}類${ti}項，摘述如後：\n`;
        validCats.forEach((c,i)=>{
          if(c.name){
            out+=`（${ZH_MID[i]||i+1}）${c.name}：\n`;
            out+=renderLines(c.lines,3); // 類別下：1、2、3、
          } else {
            out+=renderLines(c.lines,1);
          }
        });
      } else {
        out+=`一、本次督導所見情形計${ti}項，摘述如後：\n`;
        validCats.forEach(c=>{ out+=renderLines(c.lines,1); });
      }
      out=out.trimEnd();
    }
  }

  document.getElementById('prevEmpty').style.display='none';
  const el=document.getElementById('prevOut');
  el.style.display='block'; el.textContent=out;
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('copyBtn').textContent='複製全文';
}

// ── Copy ──
function copyOut(){
  const t=document.getElementById('prevOut').textContent; if(!t) return;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('copyBtn');
    b.textContent='✓ 已複製'; b.classList.add('copied');
    setTimeout(()=>{b.textContent='複製全文';b.classList.remove('copied');},2000);
  });
}

// ── Clear ──
function clearAll(){
  document.getElementById('obs').value='';
  document.getElementById('prev-box').style.display='none';
  document.getElementById('stat').textContent='－';
  document.getElementById('prevEmpty').style.display='flex';
  document.getElementById('prevOut').style.display='none';
}
</script>
